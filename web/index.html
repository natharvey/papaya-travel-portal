<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/papaya-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Papaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-primary: #F07332;
        --color-primary-dark: #D45E1E;
        --color-secondary: #2D4A5A;
        --color-accent: #FEF0E6;
        --color-success: #2A9D5C;
        --color-warning: #E8A020;
        --color-error: #DC3545;
        --color-bg: #FAF6EE;
        --color-surface: #FFFFFF;
        --color-border: #EAE0D0;
        --color-text: #2D4A5A;
        --color-text-muted: #7A9099;
        --radius: 10px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        --shadow-sm: 0 1px 4px rgba(45,74,90,0.08);
        --shadow-md: 0 4px 16px rgba(45,74,90,0.10);
        --shadow-lg: 0 8px 32px rgba(45,74,90,0.14);
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--color-bg);
        color: var(--color-text);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      a { color: var(--color-primary); text-decoration: none; }
      a:hover { text-decoration: underline; }

      button {
        cursor: pointer;
        font-family: inherit;
      }

      input, textarea, select {
        font-family: inherit;
      }

      .hide-date-icon::-webkit-calendar-picker-indicator {
        display: none;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
