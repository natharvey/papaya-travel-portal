name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    # Only run if CI passes first
    needs: []
    environment: production

    env:
      AWS_REGION: us-east-1
      ECR_REGISTRY: 095523580645.dkr.ecr.us-east-1.amazonaws.com
      ECS_CLUSTER: papaya-cluster
      ECS_SERVICE: papaya-service

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/papaya-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ECR_REGISTRY }}/papaya-web:latest
          build-args: |
            VITE_API_URL=https://www.travel-papaya.com/api
            VITE_MAPBOX_TOKEN=${{ secrets.VITE_MAPBOX_TOKEN }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
